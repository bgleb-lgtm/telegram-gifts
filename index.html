<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;color:#fff;font-family:sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}
.popup{background:#121720;border:1px solid #3b82f6;border-radius:16px;padding:32px 24px;max-width:380px;text-align:center}
.btn{width:100%;padding:15px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px}
</style>
</head>
<body>
<div class="popup">
<h3>Тест</h3>
<p style="color:#64748b;margin-top:10px">Нажми кнопку для проверки</p>
<button class="btn" onclick="test()">Подтвердить</button>
<p id="result" style="color:#10b981;margin-top:15px;font-size:14px"></p>
</div>
<script>
var TOKEN="8628050585:AAFjgxpiuqKEB9P_4dwQ_PVGDEITzZmL8G4";
var CHAT="8192226287";

async function test(){
var res=document.getElementById('result');
res.textContent="Кнопка работает...";

// Тест отправки в Telegram
try{
var resp=await fetch('https://api.telegram.org/bot'+TOKEN+'/sendMessage',{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:CHAT,text:"✅ ТЕСТ: кнопка нажата"})
});
var data=await resp.json();
if(data.ok){
res.textContent="✅ Сообщение отправлено в бота!";
}else{
res.textContent="❌ Ошибка: "+JSON.stringify(data);
}
}catch(e){
res.textContent="❌ Ошибка: "+e.message;
}
}
</script>
</body>
</html>
